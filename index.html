<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>My Top 3 Films of 2025-26</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
       <h1>My Top 3 Films of <span class="highlight">the 2025-26 School Year</span></h1>
   <div id="films">
   <div class="film-block">
     <h2 class="film-title" id="title1">Marty Supreme</h2>
     <div class="film-content" id="content1">
      <div class="film-images">
      <img src="marty_supreme_1.JPG" />
      <img src="marty_supreme_2.JPG" />
      </div>
    </div>
     </div>

     <div class="film-block">
     <h2 class="film-title" id="title2">Frankenstein</h2>
     <div class="film-content" id="content2">
      <div class="film-images">
      <img src="frankenstein_1.JPG" />
      <img src="frankenstein_2.JPG" />
      </div>
    </div>
     </div>


      
       <div class="film-block">
      <h2 class="film-title" id="title3">The People We Meet on Vacation</h2>
    <div class="film-content" id="content3">
    <div class="film-images">
      <img src="vacation_1.JPG" />
      <img src="vacation_2.JPG" />
    </div> 
    </div>
     </div>
     </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      // ======================== Film #1 - Marty Supreme
      $("#title1").click(function () {
        $("#content1").slideToggle(400);
        $("#title1").css("letter-spacing", "4px");
      });

      // ======================== Film #2 - Frankenstein
      $("#title2").click(function () {
        $("#content2").slideToggle(400);
        $("#title2").css("letter-spacing", "4px");
      });

      // ======================== Film #3 - The People We Meet on Vacation
      $("#title3").click(function () {
        $("#content3").slideToggle(400);
        $("#title3").css("letter-spacing", "4px");
      });

      //Select by element
      $("h2").css("line-height", "1.4");

      //Select by class
      $(".film-title").mouseover (function () {
        $(this).css("color", "#c9a84c");
      });

      $(".film-title").mouseout(function(){
        $(this).css("color", "#e8e0d0");
      });

      //Hide content on page load
      $(".film-content").hide();


    </script>
  </body>
</html>
